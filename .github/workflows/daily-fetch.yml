name: Daily job fetch

on:
  schedule:
    # 06:00 UTC = 14:00 в Бали (UTC+8) — можно поменять на своё удобное время
    - cron: "0 6 * * *"
  workflow_dispatch: {} # позволяет запустить вручную кнопкой в GitHub, если захочется проверить сразу

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run fetch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --dns-result-order=ipv4first
